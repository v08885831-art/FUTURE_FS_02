<!DOCTYPE html>
<html>
<head>
    <title>People Information Manager</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        header {
            background: #007bff;
            color: white;
            padding: 15px;
        }

        input, select {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            border: none;
            cursor: pointer;
        }

        .save { background: green; color: white; }
        .clear { background: red; color: white; }
        .edit { background: orange; color: white; }
        .delete { background: red; color: white; }

        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 320px;
            border-radius: 8px;
            box-shadow: 0 0 5px gray;
            text-align: left;
        }
    </style>
</head>

<body>

<header>
    <h1>📋 People Information Manager</h1>
</header>

<div>
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email"><br>

    <input id="address" placeholder="Address">
    <input id="dob" type="date"><br>

    <input id="father" placeholder="Father Name">
    <input id="mother" placeholder="Mother Name"><br>

    <select id="gender">
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
    </select>

    <input id="occupation" placeholder="Occupation"><br>

    <button class="save" onclick="saveData()">Save / Add</button>
    <button class="clear" onclick="clearAll()">Clear All</button>

    <h3>Total Records: <span id="count">0</span></h3>

    <ul id="list"></ul>
</div>

<script>
    let people = JSON.parse(localStorage.getItem("people")) || [];
    let editIndex = -1;

    function saveData() {

        let person = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            address: document.getElementById("address").value,
            dob: document.getElementById("dob").value,
            father: document.getElementById("father").value,
            mother: document.getElementById("mother").value,
            gender: document.getElementById("gender").value,
            occupation: document.getElementById("occupation").value
        };

        // simple validation
        if (person.name === "" || person.email === "") {
            alert("Name and Email are required");
            return;
        }

        if (editIndex === -1) {
            people.push(person);
        } else {
            people[editIndex] = person;
            editIndex = -1;
        }

        localStorage.setItem("people", JSON.stringify(people));
        displayData();
        clearInputs();
    }

    function displayData() {
        let list = document.getElementById("list");
        list.innerHTML = "";

        people.forEach((p, index) => {
            let li = document.createElement("li");

            li.innerHTML = `
                <strong>${p.name}</strong><br>
                Email: ${p.email}<br>
                Address: ${p.address}<br>
                DOB: ${p.dob}<br>
                Father: ${p.father}<br>
                Mother: ${p.mother}<br>
                Gender: ${p.gender}<br>
                Occupation: ${p.occupation}<br>
                <button class="edit" onclick="editData(${index})">Edit</button>
                <button class="delete" onclick="deleteData(${index})">Delete</button>
            `;

            list.appendChild(li);
        });

        document.getElementById("count").textContent = people.length;
    }

    function deleteData(index) {
        people.splice(index, 1);
        localStorage.setItem("people", JSON.stringify(people));
        displayData();
    }

    function editData(index) {
        let p = people[index];

        document.getElementById("name").value = p.name;
        document.getElementById("email").value = p.email;
        document.getElementById("address").value = p.address;
        document.getElementById("dob").value = p.dob;
        document.getElementById("father").value = p.father;
        document.getElementById("mother").value = p.mother;
        document.getElementById("gender").value = p.gender;
        document.getElementById("occupation").value = p.occupation;

        editIndex = index;
    }

    function clearAll() {
        localStorage.clear();
        people = [];
        displayData();
    }

    function clearInputs() {
        document.querySelectorAll("input, select").forEach(el => el.value = "");
    }

    displayData();
</script>

</body>
</html>
